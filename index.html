<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>วิดีโอ</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .main-video {
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    video {
      width: 100%;
      height: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card.active {
      outline: 2px solid #007bff;
    }

    .thumb {
      position: relative;
    }

    .thumb img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      border-radius: 50%;
    }

    .title {
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎬 วิดีโอ</h1>

  <!-- Main Video -->
  <div class="main-video">
    <video id="mainVideo" controls>
      <source src="video/เทศบาลเมืองปากพูนอุโมงค์อเมซอน.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Video List -->
  <div class="grid" id="videoList"></div>
</div>

<script>
  const videos = [
    {
      title: "แนะนำเทศบาล",
      src: "videos/video1.mp4",
      thumbnail: "videos/thumb1.jpg"
    },
    {
      title: "กิจกรรมชุมชน",
      src: "videos/video2.mp4",
      thumbnail: "videos/thumb2.jpg"
    },
    {
      title: "บริการออนไลน์",
      src: "videos/video3.mp4",
      thumbnail: "videos/thumb3.jpg"
    }
  ];

  const mainVideo = document.getElementById("mainVideo");
  const videoList = document.getElementById("videoList");

  function renderVideos() {
    videoList.innerHTML = "";

    videos.forEach((video, index) => {
      const card = document.createElement("div");
      card.className = "card";
      if (index === 0) card.classList.add("active");

      card.innerHTML = `
        <div class="thumb">
          <img src="${video.thumbnail}" />
          <div class="play">▶</div>
        </div>
        <div class="title">${video.title}</div>
      `;

      card.onclick = () => {
        mainVideo.src = video.src;
        mainVideo.play();

        document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
        card.classList.add("active");
      };

      videoList.appendChild(card);
    });
  }

  renderVideos();
</script>

</body>
</html>
